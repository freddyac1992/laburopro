name: QA

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  basic-qa:
    name: Lint, typecheck, build, HTTP smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://gxaqrwrqlwvgrjhmfhti.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'sb_publishable_lMgB150gcABG_YgaNVTU8A_XEy1JNi5' }}
      NEXT_TELEMETRY_DISABLED: '1'
      QA_BASE_URL: http://127.0.0.1:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify required environment
        run: |
          test -n "$NEXT_PUBLIC_SUPABASE_URL"
          test -n "$NEXT_PUBLIC_SUPABASE_ANON_KEY"

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Start production server
        run: |
          npm run start -- --port 3000 > /tmp/laburopro-next.log 2>&1 &
          echo $! > /tmp/laburopro-next.pid
          for i in {1..30}; do
            if curl -fsS "$QA_BASE_URL" > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/laburopro-next.log
          exit 1

      - name: HTTP smoke tests
        run: npm run qa:http

      - name: Show server logs on failure
        if: failure()
        run: cat /tmp/laburopro-next.log || true
